<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение на свадьбу Никиты и Ксении</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
    font-family:'Cormorant Garamond',serif;
    background:#DCDDCC;
    color:#2e2a24;
    overflow-x:hidden;
}

/* ================= PREMIUM ENVELOPE ================= */

.envelope-overlay{
    position:fixed;
    inset:0;
    background:#F4F1E6;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    cursor:pointer;
}

.envelope-premium{
    position:relative;
    width:320px;
    height:220px;
    perspective:1200px;
}

/* BODY */
.envelope-body{
    position:absolute;
    width:100%;
    height:100%;
    background:#A3B86C;
    border-radius:16px;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    overflow:hidden;
}

/* FLAP */
.envelope-flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#B7C98A;
    clip-path:polygon(0 0,50% 60%,100% 0);
    transform-origin:top;
    transition:transform 1s cubic-bezier(.65,.05,.36,1);
    z-index:5;
}

/* STAMP */
.stamp{
    position:absolute;
    width:70px;
    height:50px;
    top:20px;
    right:20px;
    background:#E8E2D3;
    border-radius:6px;
}

/* SEAL */
.seal{
    position:absolute;
    width:50px;
    height:50px;
    background:#C4A484;
    border-radius:50%;
    top:20px;
    left:20px;
}

/* TEXT */
.envelope-text{
    position:absolute;
    bottom:30px;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
}

.envelope-text .date{
    font-size:18px;
    margin-top:5px;
}

/* LETTER */
.letter{
    position:absolute;
    width:85%;
    height:85%;
    background:#fffdf6;
    top:10%;
    left:7.5%;
    border-radius:12px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
    transform:translateY(60px);
    opacity:0;
    transition:all 1s ease;
}

/* OPEN STATE */
.envelope-premium.open .envelope-flap{
    transform:rotateX(180deg);
}

.envelope-premium.open .letter{
    transform:translateY(-20px);
    opacity:1;
}

/* FADE OUT */
.envelope-overlay.hide{
    opacity:0;
    transition:opacity 1s ease;
}

/* ================= MAIN CONTENT ================= */

.main-content{
    opacity:0;
    transition:opacity 1.2s ease;
}

.main-content.show{
    opacity:1;
}

.container{
    max-width:800px;
    margin:auto;
    padding:2rem;
}

/* HERO */
.hero{
    text-align:center;
    background:#fffaf5;
    padding:2rem;
    border-radius:40px;
}

.hero h1{
    font-family:'Great Vibes',cursive;
    font-size:2.6rem;
    color:#7c5d44;
}

/* GREETING */
.greeting{
    margin:2rem 0;
    padding:1.5rem;
    background:#fffaf5;
    border-radius:20px;
    text-align:center;
    font-size:1.4rem;
}

.warm-text{
    font-size:1.6rem;
    color:#b2653c;
}

/* CARDS */
.timeline-list{
    display:flex;
    flex-direction:column;
    gap:1.5rem;
}

.card{
    background:white;
    border-radius:20px;
    padding:1.5rem;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-header{
    font-size:1.6rem;
    color:#AA7B58;
    margin-bottom:0.5rem;
}

/* FOOTER */
footer{
    text-align:center;
    margin-top:2rem;
}

</style>
</head>

<body>

<!-- PREMIUM ENVELOPE -->
<div class="envelope-overlay" id="envelopeIntro">
    <div class="envelope-premium" id="envelope">

        <div class="envelope-flap"></div>

        <div class="envelope-body">
            <div class="stamp"></div>
            <div class="seal"></div>

            <div class="envelope-text">
                <div>Приглашение</div>
                <div class="date">25.07.2026</div>
            </div>
        </div>

        <div class="letter"></div>

    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">
    <div class="container">

        <div class="hero">
            <h1>Никита & Ксения</h1>
            <p>25 июля 2026</p>
        </div>

        <div class="greeting">
            <p><strong>Дорогие гости!</strong></p>
            <p class="warm-text">Счастье ярче, когда делишься им</p>
            <p>Будем рады видеть вас на нашей свадьбе</p>
        </div>

        <div class="timeline-list">

            <div class="card">
                <div class="card-header">Церемония</div>
                <p>11:00 — сбор гостей</p>
                <p>11:20 — начало</p>
            </div>

            <div class="card">
                <div class="card-header">Праздник</div>
                <p>15:00 — гостевой дом «Камыши»</p>
            </div>

        </div>

        <footer>
            С любовью, Никита и Ксения ❤️
        </footer>

    </div>
</div>

<script>
const envelope = document.getElementById('envelope');
const overlay = document.getElementById('envelopeIntro');
const main = document.getElementById('mainContent');

let opened = false;

overlay.addEventListener('click', () => {
    if(opened) return;
    opened = true;

    envelope.classList.add('open');

    setTimeout(()=>{
        overlay.classList.add('hide');
    },1400);

    setTimeout(()=>{
        main.classList.add('show');
        overlay.style.display='none';
    },2000);
});
</script>

</body>
</html>
