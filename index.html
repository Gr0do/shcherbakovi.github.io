<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ваше приглашение</title>
    <style>
        /* ----- Базовые сбросы ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #f9f1e0; /* тёплый фон – замените на свой */
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* ----- Конверт (интро) ----- */
        .envelope {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fdf8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        /* Стили самого конверта */
        .envelope-card {
            width: 280px;
            height: 180px;
            background: #ffefcf;
            border-radius: 12px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
            position: relative;
            transition: transform 0.3s;
            transform-style: preserve-3d;
        }
        .envelope-card:hover {
            transform: scale(1.02);
        }
        /* Клапан конверта (треугольник) */
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffe0a3;
            clip-path: polygon(0% 0%, 100% 0%, 50% 35%);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-origin: top;
            border-radius: 12px 12px 0 0;
        }
        /* Анимация открытия – клапан поднимается */
        .envelope-card.open .flap {
            clip-path: polygon(0% 0%, 100% 0%, 50% -80%);
            opacity: 0;
        }
        /* "Письмо" внутри */
        .letter {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            top: 40px;
            background: white;
            border-radius: 8px;
            box-shadow: inset 0 0 0 1px #ffe0a3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #b97f44;
            font-weight: bold;
            transition: all 0.4s ease;
        }
        .envelope-card.open .letter {
            transform: translateY(-20px);
            opacity: 0;
        }
        /* Текст на конверте */
        .envelope-text {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 18px;
            color: #b97f44;
            font-weight: bold;
            pointer-events: none;
        }
        /* ----- Основной контент (скрыт изначально) ----- */
        .main-content {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.9s ease, visibility 0.9s;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
        }
        .main-content.show {
            opacity: 1;
            visibility: visible;
        }
        /* Адаптивность */
        @media (max-width: 600px) {
            .envelope-card { width: 240px; height: 160px; }
            .envelope-text { font-size: 14px; }
        }
    </style>
</head>
<body>

<!-- БЛОК КОНВЕРТА -->
<div class="envelope" id="envelopeIntro">
    <div class="envelope-card" id="envelopeCard">
        <div class="flap"></div>
        <div class="letter">💌 Письмо</div>
        <div class="envelope-text">Нажмите, чтобы открыть</div>
    </div>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ ВАШЕГО ПРИГЛАШЕНИЯ -->
<div class="main-content" id="mainContent">
    <!-- ---- СЮДА ВСТАВЬТЕ ВЕСЬ ТЕКУЩИЙ КОД ВАШЕЙ СТРАНИЦЫ ---- -->
    <h1>Дорогие гости!</h1>
    <p>Приглашаем вас на наш праздник...</p>
    <!-- ... остальной ваш контент ... -->
    <!-- ---------------------------------------------------- -->
</div>

<script>
    (function() {
        const envelopeBlock = document.getElementById('envelopeIntro');
        const envelopeCard = document.getElementById('envelopeCard');
        const mainContent = document.getElementById('mainContent');
        let isOpened = false;

        // Функция, которая запускает анимацию открытия
        function openEnvelope() {
            if (isOpened) return;
            isOpened = true;

            // Добавляем класс для анимации конверта (клапан открывается)
            envelopeCard.classList.add('open');

            // После завершения анимации конверта (0.5с + небольшая задержка) показываем основной контент
            setTimeout(() => {
                // Показываем основную часть
                mainContent.classList.add('show');
                // Плавно прячем конверт
                envelopeBlock.style.opacity = '0';
                setTimeout(() => {
                    envelopeBlock.style.display = 'none';
                }, 800);
            }, 600); // подождать пока визуально откроется клапан и уйдёт письмо
        }

        // Клик по конверту
        envelopeBlock.addEventListener('click', openEnvelope);
    })();
</script>

</body>
</html>
